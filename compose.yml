#   rahoot:
#     image: ralex91/rahoot:latest
#     ports:
#       - "3000:3000"
#     volumes:
#       - ./config:/app/config
services:
  rahoot:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./config:/app/config
    depends_on:
      spilhoot-db:
        condition: service_healthy
    networks:
      - rahoot_net
    environment:
      # Mengirimkan URL koneksi database ke dalam backend 
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@spilhoot-db:5432/${POSTGRES_DB}
  
  spilhoot-db:
    image: postgres:16
    container_name: spilhoot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - ./db/migrations:/docker-entrypoint-initdb.d
      - rahoot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rahoot_net
    

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: spilhoot-pgadmin
    restart: unless-stopped
    depends_on:
      - spilhoot-db
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5081:80"
    volumes:
      - ./servers.json:/pgadmin4/servers.json
    networks:
      - rahoot_net
    
volumes:
  rahoot_pgdata:

networks:
  rahoot_net:
    driver: bridge